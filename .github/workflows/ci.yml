name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: ""
          REDIS_URL: redis://localhost:6379
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/socialposter
          TOKEN_ENCRYPTION_KEY: ci-placeholder-32-bytes-long-key!!
          BETTER_AUTH_SECRET: ci-placeholder
          NEXT_PUBLIC_APP_URL: http://localhost:3010

      - name: Test
        run: npm run test
